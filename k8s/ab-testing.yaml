# A/B Testing Deployment
# Version A (control group)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-a
  labels:
    app: aceest-fitness
    version: a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      version: a
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: a
    spec:
      containers:
      - name: aceest-fitness
        image: ghcr.io/deeppatel-bits/aceest-fitness:v2.2.4
        ports:
        - containerPort: 5000
        env:
        - name: AB_VERSION
          value: "A"
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
---
# Version B (test group)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-b
  labels:
    app: aceest-fitness
    version: b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      version: b
  template:
    metadata:
      labels:
        app: aceest-fitness
        version: b
    spec:
      containers:
      - name: aceest-fitness
        image: ghcr.io/deeppatel-bits/aceest-fitness:v3.2.4
        ports:
        - containerPort: 5000
        env:
        - name: AB_VERSION
          value: "B"
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
---
# Service A
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-a-service
spec:
  selector:
    app: aceest-fitness
    version: a
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: NodePort
---
# Service B
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-b-service
spec:
  selector:
    app: aceest-fitness
    version: b
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 5000
  type: NodePort
