# Shadow Deployment
# Production version (handles real traffic)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-production
  labels:
    app: aceest-fitness
    track: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-fitness
      track: production
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: production
    spec:
      containers:
      - name: aceest-fitness
        image: ghcr.io/deeppatel-bits/aceest-fitness:v3.2.4
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
---
# Shadow version (receives mirrored traffic, responses discarded)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-fitness-shadow
  labels:
    app: aceest-fitness
    track: shadow
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-fitness
      track: shadow
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: shadow
    spec:
      containers:
      - name: aceest-fitness
        image: ghcr.io/deeppatel-bits/aceest-fitness:latest
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-production-service
spec:
  selector:
    app: aceest-fitness
    track: production
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-fitness-shadow-service
spec:
  selector:
    app: aceest-fitness
    track: shadow
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 5000
  type: ClusterIP
